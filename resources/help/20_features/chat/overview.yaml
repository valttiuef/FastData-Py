entries:
  chat.sessions:
    title: "Chat sessions"
    short: "Create, switch, and delete independent chat histories."
    body: |
      <p>Chat history is stored per session.</p>
      <ul>
        <li><b>New Chat</b> creates a separate empty session.</li>
        <li><b>Delete Chat</b> removes only the currently selected session.</li>
        <li>Other sessions and their history remain available in the session selector.</li>
      </ul>

  chat.overview:
    title: "Using Chat"
    short: "Ask the built-in assistant and keep a record of conversations."
    body: |
      <p>The chat window lets you send questions to the assistant and keeps a history in the log database.</p>
      <ul>
        <li>Chat messages are saved automatically with the log database.</li>
        <li>Use the stop button next to <b>Send</b> to cancel an in-progress streamed reply.</li>
        <li>Each chat session can be deleted separately without removing other log entries.</li>
        <li>Resetting the log database clears chat history too.</li>
      </ul>
